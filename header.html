<!DOCTYPE html>
<html>
<head>
    <title>DriveSmart Integrated Academy</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; border-radius: 5px; }
        nav { margin: 15px 0; padding: 10px; background-color: #34495e; text-align: center; border-radius: 5px; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        form { background-color: white; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; padding: 10px 15px; border: none; border-radius: 3px; cursor: pointer; width: 100%; }
        button:hover { background-color: #219653; }
        footer { margin-top: 30px; text-align: center; padding: 10px; font-size: 0.9em; color: #7f8c8d; border-top: 1px solid #ddd; }
    </style>
</head>
<body>
    <header>
        <h1>🚗 DriveSmart Integrated Academy</h1>
        <p>Centralized Driving School Management Platform</p>
    </header>
